<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毎日絵文字</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="calendar-header">
            <button id="prev-month" class="nav-btn">&lt;</button>
            <h1 id="current-month-display">2026年3月</h1>
            <button id="next-month" class="nav-btn">&gt;</button>
        </header>

        <div class="search-area">
            <div class="search-row">
                <input type="text" id="keyword-search" placeholder="📝 メモから検索...">
                <button id="reset-search" class="reset-btn hidden">戻す</button>
                <button id="download-btn" class="download-btn">保存</button>
            </div>

            <div class="emoji-search-container">
                <button id="emoji-search-trigger" class="emoji-trigger-btn">
                    <span>🔍 絵文字で絞り込む</span>
                    <span class="arrow">▼</span>
                </button>
                <div id="emoji-dropdown" class="emoji-dropdown hidden">
                    <p class="dropdown-label">気分から探す</p>
                    <div class="emoji-grid-sm" id="mood-search-options">
                        <span class="search-emoji-item" data-val="5">🤩</span>
                        <span class="search-emoji-item" data-val="4">😊</span>
                        <span class="search-emoji-item" data-val="3">🙂</span>
                        <span class="search-emoji-item" data-val="2">😐</span>
                        <span class="search-emoji-item" data-val="1">😞</span>
                    </div>
                    <p class="dropdown-label">スタンプから探す</p>
                    <div class="emoji-grid-sm">
                        <span class="search-emoji-item">☀️</span><span class="search-emoji-item">☁️</span>
                        <span class="search-emoji-item">☔</span>
                        <span class="search-emoji-item">🌪️</span>
                        <span class="search-emoji-item">🍞</span>
                        <span class="search-emoji-item">🍜</span>
                        <span class="search-emoji-item">🍚</span>
                        <span class="search-emoji-item">🍪</span>
                        <span class="search-emoji-item">💤</span>
                        <span class="search-emoji-item">🎀</span>
                        <span class="search-emoji-item">💊</span>
                        <span class="search-emoji-item">🏥</span>
                        <span class="search-emoji-item">😷</span>
                        <span class="search-emoji-item">👍</span>
                        <span class="search-emoji-item">🪥</span>
                        <span class="search-emoji-item">🦴</span>
                        <span class="search-emoji-item">👟</span>
                        <span class="search-emoji-item">💪</span>
                        <span class="search-emoji-item">💻</span>
                        <span class="search-emoji-item">📖</span>
                    </div>
                </div>

                <div id="search-results" class="search-results hidden"></div>
            </div>

            <div class="weekdays">
                <div>日</div>
                <div>月</div>
                <div>火</div>
                <div>水</div>
                <div>木</div>
                <div>金</div>
                <div>土</div>
            </div>

            <div id="calendar" class="calendar-grid"></div>

            <div id="modal-overlay" class="modal-overlay hidden">
                <div class="editor-modal">
                    <h2 id="selected-date-label">日付</h2>
                    <div class="field">
                        <h3>今日の気分</h3>
                        <p id="mood-warning" class="warning-text hidden">気分を選んでね ✨</p>
                        <div class="mood-selector">
                            <button class="mood-item" data-mood="5" id="mood5"><span class="emoji">🤩</span><span
                                    class="label">最高</span></button>
                            <button class="mood-item" data-mood="4" id="mood4"><span class="emoji">😊</span><span
                                    class="label">良い</span></button>
                            <button class="mood-item" data-mood="3" id="mood3"><span class="emoji">🙂</span><span
                                    class="label">普通</span></button>
                            <button class="mood-item" data-mood="2" id="mood2"><span class="emoji">😐</span><span
                                    class="label">悪め</span></button>
                            <button class="mood-item" data-mood="1" id="mood1"><span class="emoji">😞</span><span
                                    class="label">憂鬱</span></button>
                        </div>
                    </div>
                    <div class="field">
                        <h3>天気</h3>
                        <div class="emoji-tags">
                            <button class="tag-item"><span class="emoji">☀️</span><span class="label">晴れ</span></button>
                            <button class="tag-item"><span class="emoji">☁️</span><span
                                    class="label">くもり</span></button>
                            <button class="tag-item"><span class="emoji">☔</span><span class="label">雨</span></button>
                            <button class="tag-item"><span class="emoji">🌪️</span><span class="label">風</span></button>
                        </div>

                        <h3>ご飯</h3>
                        <div class="emoji-tags">
                            <button class="tag-item"><span class="emoji">🍞</span><span class="label">朝飯</span></button>
                            <button class="tag-item"><span class="emoji">🍜</span><span class="label">昼飯</span></button>
                            <button class="tag-item"><span class="emoji">🍚</span><span class="label">夜飯</span></button>
                            <button class="tag-item"><span class="emoji">🍪</span><span class="label">間食</span></button>
                        </div>

                        <h3>健康</h3>
                        <div class="emoji-tags">
                            <button class="tag-item"><span class="emoji">💤</span><span class="label">昼寝</span></button>
                            <button class="tag-item"><span class="emoji">🎀</span><span class="label">生理</span></button>
                            <button class="tag-item"><span class="emoji">💊</span><span class="label">薬</span></button>
                            <button class="tag-item"><span class="emoji">🏥</span><span class="label">病院</span></button>
                            <button class="tag-item"><span class="emoji">😷</span><span
                                    class="label">体調不良</span></button>
                            <button class="tag-item"><span class="emoji">👍</span><span
                                    class="label">爪切り</span></button>
                            <button class="tag-item"><span class="emoji">🪥</span><span
                                    class="label">歯磨き</span></button>
                        </div>

                        <h3>達成</h3>
                        <div class="emoji-tags">
                            <button class="tag-item"><span class="emoji">🦴</span><span
                                    class="label">筋肉痛</span></button>
                            <button class="tag-item"><span class="emoji">👟</span><span class="label">外</span></button>
                            <button class="tag-item"><span class="emoji">💪</span><span
                                    class="label">筋トレ</span></button>
                            <button class="tag-item"><span class="emoji">💻</span><span class="label">仕事</span></button>
                            <button class="tag-item"><span class="emoji">📖</span><span class="label">勉強</span></button>
                            <button class="tag-item"><span class="emoji">🧺</span><span class="label">洗濯</span></button>
                            <button class="tag-item"><span class="emoji">🧹</span><span class="label">掃除</span></button>
                        </div>

                        <h3>感情</h3>
                        <div class="emoji-tags">
                            <button class="tag-item"><span class="emoji">✨</span><span class="label">楽しい</span></button>
                            <button class="tag-item"><span class="emoji">🍀</span><span
                                    class="label">幸せな</span></button>
                            <button class="tag-item"><span class="emoji">🔥</span><span
                                    class="label">意欲的</span></button>
                            <button class="tag-item"><span class="emoji">🎊</span><span
                                    class="label">嬉しい</span></button>
                            <button class="tag-item"><span class="emoji">🏆</span><span
                                    class="label">誇らしい</span></button>
                            <button class="tag-item"><span class="emoji">🪑</span><span class="label">楽な</span></button>

                            <button class="tag-item"><span class="emoji">🥀</span><span
                                    class="label">憂鬱な</span></button>
                            <button class="tag-item"><span class="emoji">🪽</span><span
                                    class="label">疲れた</span></button>
                            <button class="tag-item"><span class="emoji">🐳</span><span
                                    class="label">悲しい</span></button>
                            <button class="tag-item"><span class="emoji">🐾</span><span
                                    class="label">悔しい</span></button>
                            <button class="tag-item"><span class="emoji">👀</span><span
                                    class="label">なんとなく</span></button>
                            <button class="tag-item"><span class="emoji">💥</span><span
                                    class="label">イライラ</span></button>
                        </div>
                    </div>
                    <textarea id="note-input" placeholder="日記メモ..."></textarea>
                    <div class="action-btns">
                        <button id="save-btn" class="primary-btn">記録を保存</button>
                        <button id="close-btn" class="secondary-btn">キャンセル</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
</body>

</html>
